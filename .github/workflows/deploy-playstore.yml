name: Deploy to Google Play

on:
  workflow_dispatch:  # Manual triggering only (prevents duplicate runs with release-build.yml)
    inputs:
      track:
        description: 'Release track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/keystore-original
          
          # Check if decode was successful (file is not empty)
          if [ ! -s $GITHUB_WORKSPACE/keystore-original ]; then
            echo "❌ Error: Keystore decode failed - file is empty"
            echo "Please configure KEYSTORE_BASE64 secret in GitHub repository settings"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          
          # Detect keystore type and convert to JKS if needed
          if file $GITHUB_WORKSPACE/keystore-original | grep -q "Java KeyStore"; then
            echo "Keystore is already in JKS format"
            mv $GITHUB_WORKSPACE/keystore-original $GITHUB_WORKSPACE/keystore.jks
            echo "KEYSTORE_TYPE=JKS" >> $GITHUB_ENV
          else
            echo "Converting PKCS12 keystore to JKS format"
            # Convert PKCS12 to JKS using keytool
            keytool -importkeystore \
              -srckeystore $GITHUB_WORKSPACE/keystore-original \
              -srcstoretype PKCS12 \
              -srcstorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -destkeystore $GITHUB_WORKSPACE/keystore.jks \
              -deststoretype JKS \
              -deststorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -noprompt
            echo "KEYSTORE_TYPE=JKS" >> $GITHUB_ENV
            rm $GITHUB_WORKSPACE/keystore-original
          fi
      
      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace
        env:
          CI: true
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_TYPE: ${{ env.KEYSTORE_TYPE }}
      
      - name: Decode Service Account JSON
        run: |
          echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" | base64 --decode > $GITHUB_WORKSPACE/service-account.json
      
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ github.workspace }}/service-account.json
          packageName: com.sky.wallapp
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: play-store-release
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
      
      - name: Cleanup
        if: always()
        run: |
          rm -f $GITHUB_WORKSPACE/keystore.jks
          rm -f $GITHUB_WORKSPACE/service-account.json

